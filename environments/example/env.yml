# environments/example/env.yml — fictional reference environment
# Used by tests, docs, and onboarding. All addresses are RFC 5737/1918 documentation ranges.
# Conforms to schemas/env.schema.json

name: example
display_name: Example Environment

ticket:
  prefix: EX
  helpdesk: none

domains:
  primary: example.local

subnets:
  mgmt: 192.0.2.0/24
  servers: 198.51.100.0/24
  clients: 203.0.113.0/24

connectivity:
  probes:
    - host: 192.0.2.1
      description: example gateway

vault:
  backend: none
  collection: example

source_of_truth:
  type: netbox
  netbox_url: https://netbox.example.local
  netbox_token_ref: "example-netbox-token"

execution:
  type: cli

ansible:
  ssh_user: root

referenced_devices: []
cross_env_credentials: []
