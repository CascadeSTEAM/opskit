name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './bin'

      - name: ansible-lint
        uses: ansible/ansible-lint@v6
        with:
          args: "ansible/"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: grep-based secret scan (no-license)
        run: |
          PATTERNS=(
            'password\s*=\s*"[^"]{8,}"'
            'api[_-]?key\s*=\s*"[^"]{8,}"'
            '-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----'
            'ghp_[A-Za-z0-9]{36}'
          )
          EXIT=0
          for p in "${PATTERNS[@]}"; do
            if grep -rnE "$p" --include='*.yml' --include='*.yaml' --include='*.py' --include='*.sh' --include='*.md' .; then
              echo "ERROR: Secret pattern matched"
              EXIT=1
            fi
          done
          exit $EXIT

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pytest (placeholder)
        run: |
          echo "Test suite not yet populated — gate is green for scaffold."
          exit 0

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: schema validation (placeholder)
        run: |
          echo "Schema validation not yet populated — gate is green for scaffold."
          exit 0
