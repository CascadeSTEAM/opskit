name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './bin'

      - name: ansible-lint
        uses: ansible/ansible-lint@v6
        with:
          args: "ansible/"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: pytest (placeholder)
        run: |
          echo "Test suite not yet populated — gate is green for scaffold."
          exit 0

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: schema validation (placeholder)
        run: |
          echo "Schema validation not yet populated — gate is green for scaffold."
          exit 0
