name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './bin'

      - name: ansible-lint (informational only during migration)
        uses: ansible/ansible-lint@v6
        continue-on-error: true
        with:
          args: "ansible/ --skip-list=syntax-check,meta-no-info,no-changed-when,fqcn-builtins"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: grep-based secret scan (no-license)
        run: |
          grep -rnE '(password|api[_-]?key|secret|token)\s*[:=]\s*"[^{][^"]{8,}"' \
            --include='*.yml' --include='*.yaml' --include='*.py' --include='*.sh' --include='*.md' . && \
            echo "ERROR: Secret pattern matched" && exit 1 || echo "PASS: no secrets found"

  # Deep secret scan with gitleaks (default ruleset + .gitleaks.toml allowlists).
  # Scans the PR diff range, not full history: main is already clean, and the
  # historical Ansible/Jinja false positives stay behind the range. Same tool
  # the pre-commit hook runs, so local and server-side cannot drift.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install gitleaks
        run: |
          VER=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks (diff range)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}..HEAD"
          else
            RANGE="HEAD~1..HEAD"
          fi
          echo "Scanning range: $RANGE"
          gitleaks git . --no-banner --redact -l error --log-opts="$RANGE"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # CI runs exactly what a developer runs — the Makefile owns the
      # dependency list and command, so the two cannot drift (issue #19).
      - name: make test
        run: make test

  # Server-side backstop for the local publication guards — the same
  # bin/publication-guard.sh the git hooks call, so a --no-verify commit or a
  # clone without hooksPath still cannot publish client data. The client-token
  # list is injected from a repo secret; fork PRs (no secret) still get the
  # RFC1918 + environment-name checks.
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: publication guards (diff + commit messages)
        env:
          CLIENT_TOKENS: ${{ secrets.CLIENT_TOKENS }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="origin/${{ github.base_ref }}...HEAD"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            RANGE="${{ github.event.before }}...HEAD"
          else
            RANGE="HEAD~1...HEAD"
          fi
          echo "Checking range: $RANGE"
          bash bin/publication-guard.sh "$RANGE"
          bash bin/publication-guard.sh --messages "$RANGE"

  # Warn (never fail) when a PR branch is behind main — stale merges are the
  # failure class ROLLBACK.md exists to recover from.
  check-sync:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: behind-main check (warn only)
        run: |
          git fetch origin main
          BEHIND=$(git rev-list --count HEAD..origin/main)
          if [ "$BEHIND" -gt 0 ]; then
            echo "::warning::Branch is $BEHIND commit(s) behind main — sync and re-run tests before merging."
          else
            echo "Branch is up to date with main."
          fi

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: schema validation
        run: |
          pip install jsonschema pyyaml pytest
          pytest tests/test_schemas.py -v

  e2e-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install deps
        run: pip install pyyaml

      - name: switch to example env
        run: |
          bash bin/switch-env.sh example
          source .env 2>/dev/null || true
          grep ACTIVE_ENV .env

      - name: open ticket
        run: |
          bash bin/open-ticket.sh "CI end-to-end test"
          cat .current-ticket | grep -E '^EX-'

      - name: scan (dry-run)
        run: |
          python3 bin/scan.py --env example --dry-run

      - name: environment isolation check
        run: |
          git check-ignore environments/example/env.yml && echo "FAIL: example should not be ignored" && exit 1 || echo "PASS: example tracked"
          git check-ignore environments/fake-env/env.yml && echo "PASS: non-example environments ignored" || { echo "FAIL: real environments must be gitignored"; exit 1; }

      - name: verify directory contract
        run: |
          test -f environments/example/env.yml && echo "PASS: env.yml exists"
          test -d environments/example/datasets/devices && echo "PASS: datasets/devices exists"
          test -f schemas/env.schema.json && echo "PASS: env schema exists"
          test -f schemas/device.schema.json && echo "PASS: device schema exists"

      - name: scan fixture test
        run: |
          pip install pyyaml
          python3 bin/scan.py --env example --dry-run 2>&1 | grep -q "Subnets" && echo "PASS: scan reads subnets from env.yml"

      - name: lint example env
        run: |
          python3 bin/opskit lint --env example

      - name: lint gate fires on missing device YAML
        run: |
          python3 bin/opskit init fake-env --subnets 192.0.2.0/24
          echo "        fake-host-01:" >> environments/fake-env/ansible/inventory.yml
          python3 bin/opskit lint --env fake-env && { echo "FAIL: lint should exit 1 on a host with no device YAML"; exit 1; } || echo "PASS: lint fails on missing device YAML"
          echo "hostname: fake-host-01" > environments/fake-env/datasets/devices/fake-host-01.yml
          python3 bin/opskit lint --env fake-env && echo "PASS: lint passes once device YAML exists"
