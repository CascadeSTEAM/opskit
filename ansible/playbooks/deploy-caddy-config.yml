---
# deploy-caddy-config.yml — Deploy the Caddy reverse proxy configuration
#
# Vhost/route definitions are var-driven: roles/caddy/defaults/main.yml ships
# the defaults (including a commented example vhost). Real values for an
# environment belong in environments/<env>/ group_vars — override
# caddy_routes, caddy_internal_subnets, and caddy_global_email there.

- name: Deploy Caddy reverse proxy configuration
  hosts: cs-caddy
  gather_facts: yes
  become: yes

  roles:
    - role: caddy
