---
# zabbix-agent defaults
zabbix_server: "198.18.42.5"
zabbix_server_active: "{{ zabbix_server }}"
zabbix_version: "7.2"
zabbix_agent_package: "zabbix-agent2"
zabbix_agent_conf: "/etc/zabbix/zabbix_agent2.conf"
zabbix_agent_service: "zabbix-agent2"
zabbix_agent_psk_file: "/etc/zabbix/zabbix_agent2.psk"

# PSK Identity and Key (set in playbook or group_vars)
zabbix_psk_identity: "PSK Cascade STEAM"
zabbix_psk_key: "" # MUST be set to enable PSK

# Host metadata for auto-registration
zabbix_agent_hostname: "{{ ansible_hostname }}"
zabbix_agent_hostmetadata: "{{ 'T1' if zabbix_tier is defined and zabbix_tier == 'T1' else 'T3' }}"
