---
# tasks file for mariadb-frappe role

- name: Deploy Frappe-specific MariaDB configuration
  ansible.builtin.copy:
    content: |
      [mysqld]
      character-set-client-handshake = FALSE
      character-set-server = utf8mb4
      collation-server = utf8mb4_unicode_ci

      [mysql]
      default-character-set = utf8mb4
    dest: /etc/mysql/mariadb.conf.d/zz-frappe.cnf
    mode: '0644'
  become: yes
  notify: restart mariadb

- name: Ensure MariaDB is running
  ansible.builtin.systemd:
    name: mariadb
    state: started
    enabled: yes
  become: yes

- name: Remove anonymous MariaDB users
  ansible.builtin.command:
    cmd: "mysql -u root -e \"DELETE FROM mysql.user WHERE User=''; FLUSH PRIVILEGES;\""
  environment:
    MYSQL_PWD: "{{ db_root_password }}"
  become: yes
  changed_when: false
  ignore_errors: yes
  no_log: true

- name: Disable remote root login
  ansible.builtin.command:
    cmd: "mysql -u root -e \"DELETE FROM mysql.user WHERE User='root' AND Host NOT IN ('localhost', '127.0.0.1', '::1'); FLUSH PRIVILEGES;\""
  environment:
    MYSQL_PWD: "{{ db_root_password }}"
  become: yes
  changed_when: false
  ignore_errors: yes
  no_log: true

- name: Remove test database
  ansible.builtin.command:
    cmd: "mysql -u root -e \"DROP DATABASE IF EXISTS test; DELETE FROM mysql.db WHERE Db='test' OR Db='test\\_%'; FLUSH PRIVILEGES;\""
  environment:
    MYSQL_PWD: "{{ db_root_password }}"
  become: yes
  changed_when: false
  ignore_errors: yes
  no_log: true
