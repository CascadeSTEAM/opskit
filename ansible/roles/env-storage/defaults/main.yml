---
# env-storage role defaults — Forgejo behind Authentik OIDC, Docker Compose.
#
# Generic, deployable-shaped values only (example.org placeholders,
# documentation-range addresses). Real values live in the gitignored
# environments/<env>/ansible/ layer; secrets are vault-supplied and never
# appear in this repo (docs/client-data-policy.md).
# See docs/environment-storage.md for the architecture this deploys.

env_storage_compose_dir: /opt/env-storage
env_storage_data_dir: /opt/env-storage/data

# Pinned image — bump deliberately; re-pin to an exact digest when a
# deployment target is chosen and hardened.
env_storage_forgejo_image: codeberg.org/forgejo/forgejo:11.0

env_storage_app_name: "opskit environment storage"
env_storage_domain: git.example.org
env_storage_root_url: "https://{{ env_storage_domain }}/"
env_storage_http_port: 3000
env_storage_ssh_port: 2222

# Forgejo runs sqlite3 in v1 (single container, no DB credentials to manage);
# switch to postgres when the deployment is hardened.
env_storage_db_type: sqlite3

# Accounts come only from the IdP — local registration stays closed.
env_storage_disable_registration: true

# ── Authentik OIDC ─────────────────────────────────────────────────────────────
env_storage_authentik_url: https://auth.example.org
# Name of the auth source as shown on the Forgejo login page.
env_storage_oidc_source_name: authentik
# OAuth2 client ID of the Forgejo application configured in Authentik.
env_storage_oidc_client_id: forgejo
# REQUIRED, vault-supplied — define in an ansible-vault file, never plaintext:
# env_storage_oidc_client_secret: "{{ vault_env_storage_oidc_client_secret }}"
env_storage_oidc_discover_url: "{{ env_storage_authentik_url }}/application/o/{{ env_storage_oidc_client_id }}/.well-known/openid-configuration"
# Claim carrying Authentik group membership (env-<name>-operators /
# env-<name>-clients), mapped to Forgejo org teams.
env_storage_oidc_group_claim: groups
