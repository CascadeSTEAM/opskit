---
caddy_config_path: /etc/caddy/Caddyfile
caddy_systemd_service: caddy

caddy_global_email: support@cascadesteam.org

caddy_internal_subnets:
  - 10.99.10.0/24
  - 10.99.20.0/24
  - 10.0.0.0/24
  # Real WAN/office addresses belong in environments/<env>/ group_vars,
  # never in committed defaults (docs/client-data-policy.md).
  - 203.0.113.194

caddy_routes:
  # Org/env-specific vhosts get their real upstream from env group_vars;
  # the committed default target is a documentation-range placeholder.
  - domain: support.cascadesteam.org
    target: 192.0.2.25:8080
    internal: false
  # Client/env-specific vhosts do NOT belong here — real values go in
  # environments/<env>/ group_vars (override caddy_routes there).
  #
  # Per-route options:
  #   target        upstream host:port for reverse_proxy (required unless handler set)
  #   internal      restrict to caddy_internal_subnets (import internal_only)
  #   extra         raw Caddyfile directives inserted before reverse_proxy
  #                 (e.g. `redir / /path` for an exact-root redirect)
  #   handler       "file_server" to serve /var/www/html instead of proxying
  #   upstream_host rewrite the Host header sent upstream (header_up Host <value>);
  #                 use when the upstream resolves its site from the inbound Host
  #                 but this vhost's public name differs from that site's name.
  # Example:
  # - domain: helpdesk.example.org
  #   target: 192.0.2.10:80
  #   internal: false
  # - domain: alias.example.org      # serves the "canonical.example.org" upstream site
  #   target: 192.0.2.10:80
  #   upstream_host: canonical.example.org
  #   internal: false
  - domain: zabbix.cascadesteam.org
    target: 10.99.10.21:80
    internal: true
    extra: |
      redir / /zabbix/
  - domain: dns.cascadesteam.org
    target: 10.99.10.10:5380
    internal: true
  - domain: traffic.cascadesteam.org
    target: ""
    internal: true
    handler: file_server
  - domain: netflow.cascadesteam.org
    target: 10.99.10.35:3000
    internal: true
  - domain: grafana.cascadesteam.org
    target: 10.99.10.22:3000
    internal: true
