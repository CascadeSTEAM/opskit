---
# LiteLLM role variables
litellm_image: "ghcr.io/berriai/litellm:main-stable"
litellm_container_name: "litellm"
litellm_port: 4000

# LiteLLM configuration
# No weak-key fallback: fail loudly if the vault var is missing.
litellm_master_key: "{{ vault_litellm_master_key }}"
litellm_drop_params: true
litellm_detailed_debug: false

# Cloud models (configured in template)
litellm_models:
  - name: "claude-sonnet-4-6"
    litellm_model: "anthropic/claude-sonnet-4-6"
    api_key_env: "ANTHROPIC_API_KEY"
  - name: "claude-opus-4-6"
    litellm_model: "anthropic/claude-opus-4-6"
    api_key_env: "ANTHROPIC_API_KEY"
  - name: "claude-haiku-4-5"
    litellm_model: "anthropic/claude-haiku-4-5-20251001"
    api_key_env: "ANTHROPIC_API_KEY"
  - name: "gemini-2.5-pro"
    litellm_model: "gemini/gemini-2.5-pro-preview-03-25"
    api_key_env: "GEMINI_API_KEY"
  - name: "gemini-2.5-flash"
    litellm_model: "gemini/gemini-2.5-flash-preview-04-17"
    api_key_env: "GEMINI_API_KEY"
  - name: "gemini-2.0-flash"
    litellm_model: "gemini/gemini-2.0-flash"
    api_key_env: "GEMINI_API_KEY"

# VaultWarden paths for API keys
vault_litellm_path: "ai-cluster/services/litellm"
